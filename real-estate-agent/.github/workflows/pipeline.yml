name: Real Estate Pipeline

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL runner
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXPORT_PATH: frontend/data.json
        run: python src/runner.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/data.json
          git commit -m "chore: update market snapshot data" || echo "No changes to commit"
          git push
